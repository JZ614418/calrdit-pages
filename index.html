<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calrdit</title>
<style>
  :root {
    --bg:#ffffff; --card:#ffffff; --stroke:#EDEDED;
    --accent:#0A0A0A; --oat:#E8D5B7;
    --text:#0A0A0A; --text2:#6B6B6B; --text3:#A8A8A8;
    --ink:#0A0A0A;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;line-height:1.55;}
  main{max-width:640px;margin:0 auto;padding:80px 24px 120px;}
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:40px;}
  .brand .mark{width:46px;height:46px;border-radius:11px;background:var(--ink);color:var(--oat);display:grid;place-items:center;font-style:italic;font-weight:600;font-size:26px;line-height:1;}
  .brand .name{font-size:22px;font-weight:600;letter-spacing:-0.01em;}
  .brand .sub{color:var(--text2);font-size:13px;margin-top:2px;}
  h1{font-size:28px;letter-spacing:-0.02em;margin:48px 0 8px;}
  p{color:var(--text2);font-size:15px;}
  .links{margin-top:40px;display:flex;flex-direction:column;gap:10px;}
  .links a{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border:0.8px solid var(--stroke);border-radius:16px;color:var(--text);text-decoration:none;font-size:15px;}
  .links a:hover{background:#FAF6F0;}
  .links a .arrow{color:var(--text3);font-size:14px;}
  footer{margin-top:80px;color:var(--text3);font-size:12px;}
  footer a{color:var(--text3);}
</style>
</head>
<body>
<main>
  <div class="brand">
    <div class="mark">¢</div>
    <div>
      <div class="name">Calrdit</div>
      <div class="sub">Spend your calories like money</div>
    </div>
  </div>

  <h1>Calrdit</h1>
  <p>A calorie tracker that treats every meal like an Apple Pay tap. Face ID, a quiet beep, and your balance drops. Calories you don't spend compound — into body fat you didn't gain.</p>

  <div class="links">
    <a href="support.html"><span>Support</span><span class="arrow">→</span></a>
    <a href="privacy.html"><span>Privacy Policy</span><span class="arrow">→</span></a>
    <a href="mailto:jzhe614@gmail.com"><span>Contact</span><span class="arrow">→</span></a>
  </div>

  <footer>
    © 2026 He Zhu · <a href="mailto:jzhe614@gmail.com">jzhe614@gmail.com</a>
  </footer>
</main>
</body>
</html>
